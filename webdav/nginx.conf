load_module modules/ngx_http_dav_ext_module.so;

worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    server {
        listen 80;
        server_name _;

        location / {
            root /data;

            # Basic Auth
            auth_basic "WebDAV";
            auth_basic_user_file /etc/nginx/.htpasswd;

            # 标准 DAV 方法
            dav_methods PUT DELETE MKCOL COPY MOVE;

            # 扩展 DAV 方法（不含 LOCK/UNLOCK，EPSON 扫描仪兼容）
            dav_ext_methods PROPFIND OPTIONS;

            # 自动创建中间目录
            create_full_put_path on;

            # 新文件权限
            dav_access user:rw group:rw all:r;

            # 最大上传 500MB
            client_max_body_size 500m;

            # 客户端临时文件路径
            client_body_temp_path /data/.tmp;

            # CORS 头
            add_header Access-Control-Allow-Origin "*";
            add_header Access-Control-Allow-Headers "Authorization,Content-Type,Depth,Destination,If-Modified-Since,Overwrite,User-Agent";
            add_header Access-Control-Allow-Methods "OPTIONS,GET,HEAD,POST,PUT,DELETE,PROPFIND,MKCOL,COPY,MOVE";
        }

        # 禁止访问隐藏文件
        location ~ /\. {
            deny all;
            return 403;
        }
    }
}
